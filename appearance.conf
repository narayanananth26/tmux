# Enable pane borders with status
set -g pane-border-status top

# Center-align the pane border text
set -g pane-border-format "#[align=centre]#{pane_index}: #{pane_current_command}"

# Pane border colors
set -g pane-border-style fg=blue
set -g pane-active-border-style fg=red

# Status bar position and length
set -g status-position bottom
set -g status-left-length 200
set -g status-right-length 100

# Status bar styles
set -g status-style "bg=default,fg=white"
set -g status-left-style "bg=default"
set -g status-right-style "bg=default"
set -g window-status-style "bg=default,fg=white"
set -g window-status-activity-style "bg=default"
set -g window-status-bell-style "bg=default"
set -g window-status-last-style "bg=default"
set -g window-status-separator ""
set -g status-justify left

# Message and mode styles
set -g message-style "bg=default,fg=#ffffd7"
set -g message-command-style "bg=default,fg=#ffffd7"
set -g mode-style "bg=#44415a,fg=#e0def4"

# Window status format with centered numbers
set -g window-status-format "#[bg=default,fg=#ffffd7]#[fg=black,bg=#ffffd7,align=centre] #I #[fg=#ffffd7,bg=default] #W#[bg=default] "
set -g window-status-current-format "#[bg=default,fg=red]#[fg=black,bg=red,align=centre] #I #[fg=red,bg=default] #W#[bg=default] "

# Status-left and status-right with prefix indicator
set -g status-left "#{?client_prefix,#[fg=black bg=green bold],#[fg=black bg=red bold]} C-a #[bg=default] #[fg=#ffffd7,bg=default,bold]#S #[bg=default] "
set -g status-right "#[bg=default] #[fg=red,bg=default]#{pane_index}:#{pane_current_command} #[fg=#ffffd7,bg=default]CPU:#{cpu_percentage} #[fg=#ffffd7,bg=default]%H:%M "
